<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotisería Maná - El Regalo del Cielo</title>
    
    <link rel="stylesheet" href="estilos/variables.css">
    <link rel="stylesheet" href="estilos/styles.css">
    <link rel="stylesheet" href="estilos/movil.css"> </head>
<body>

    <header class="navbar">
        <div class="logo">Rotisería Maná</div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="#">Nosotros</a></li>
            </ul>
        </nav>
        <div class="cart-icon">
            <a href="carrito.html">🛒 <span id="cart-count">0</span></a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="badge">ARTESANAL & DIVINO</span>
                <h1>El Regalo del <span>Cielo</span> a Tu Mesa</h1>
                <p>Inspirados en la abundancia del Maná, horneamos cada pieza con devoción.</p>
                <div class="hero-btns">
                    <a href="productos.html" class="btn btn-primary">Explorar Menú</a>
                    <a href="#" class="btn btn-secondary">Nuestra Historia</a>
                </div>
            </div>
            <div class="hero-image">
                <img src="recursos/basket.png" alt="Canasta de pan">
            </div>
        </section>

        <section class="specialties">
            <h2>Nuestras Especialidades</h2>
            <div class="grid-container">
                <article class="card">
                    <img src="recursos/pizza-home.jpg" alt="Pizzas">
                    <div class="card-info">
                        <h3>Pizzas al Horno</h3>
                        <p>Masa madre y fuego lento.</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script src="scripts/general.js"></script> <script src="scripts/carrito.js"></script>   
</body>
</html>
